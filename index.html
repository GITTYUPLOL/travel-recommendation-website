<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TravelMate — Discover Your Next Trip</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="nav-bar">
  <span class="brand">🌍 TravelMate</span>
  <span class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact Us</a>
  </span>
</nav>

<header class="hero">
  <h1>Discover Your Next Adventure</h1>
  <p>Search beaches, temples, and countries — find your perfect destination.</p>
</header>

<section class="search-section">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Try 'beach', 'temple', or 'country'…" />
    <button class="btn-search" id="searchBtn">Search</button>
    <button class="btn-clear" id="clearBtn">Clear</button>
  </div>
</section>

<main>
  <div class="results-info" id="resultsInfo">Showing all destinations</div>
  <div class="grid" id="resultsGrid"></div>
</main>

<footer>© TravelMate — Built for the JavaScript Programming Essentials final project.</footer>

<script src="script.js"></script>
</body>
</html>
